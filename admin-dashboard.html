<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Summer School 2026</title>
    <link rel="stylesheet" href="admin-dashboard.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* ---- LOGIN OVERLAY ---- */
        .login-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(5, 5, 20, 0.97);
            backdrop-filter: blur(20px);
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-card {
            background: rgba(20, 20, 45, 0.9);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-card .login-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin: 0 auto 1.5rem;
        }

        .login-card h2 {
            font-family: 'Inter', sans-serif;
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .login-card input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            background: rgba(10, 10, 30, 0.8);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            margin-bottom: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .login-card input:focus {
            border-color: #6366f1;
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
        }

        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .login-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            min-height: 1.2em;
        }
    </style>
</head>

<body>
    <!-- LOGIN OVERLAY -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-icon">🔐</div>
            <h2>Admin Login</h2>
            <p>Enter admin credentials to access the dashboard</p>
            <form id="loginForm">
                <input type="email" id="adminEmail" placeholder="Admin Email" required autocomplete="email">
                <input type="password" id="adminPassword" placeholder="Password" required
                    autocomplete="current-password">
                <button type="submit" id="loginBtn">Sign In</button>
            </form>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <div class="dashboard-bg"></div>

    <div class="container" id="dashboardContent" style="display: none;">
        <header class="reveal">
            <div class="logo">
                <div class="logo-icon">SS</div>
                <div class="logo-text">
                    <h1>Admin<span>Portal</span></h1>
                </div>
            </div>
            <div class="nav-actions">
                <button class="btn-icon" title="Export CSV" id="exportBtn">📥</button>
                <button class="btn-icon" title="Logout" id="logoutBtn">🚪</button>
            </div>
        </header>

        <main>
            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card blue reveal" style="animation-delay: 0.1s">
                    <div class="stat-header">
                        <span class="stat-label">TOTAL PARTICIPANTS</span>
                        <span class="stat-icon">👥</span>
                    </div>
                    <div class="stat-value" id="statTotal">00</div>
                </div>
                <div class="stat-card purple reveal" style="animation-delay: 0.2s">
                    <div class="stat-header">
                        <span class="stat-label">PAID TICKETS</span>
                        <span class="stat-icon">💰</span>
                    </div>
                    <div class="stat-value" id="statPaid">00</div>
                </div>
                <div class="stat-card green reveal" style="animation-delay: 0.3s">
                    <div class="stat-header">
                        <span class="stat-label">CHECKED IN</span>
                        <span class="stat-icon">✅</span>
                    </div>
                    <div class="stat-value" id="statIn">00</div>
                </div>
                <div class="stat-card pink reveal" style="animation-delay: 0.4s">
                    <div class="stat-header">
                        <span class="stat-label">PENDING PAYMENTS</span>
                        <span class="stat-icon">⏳</span>
                    </div>
                    <div class="stat-value" id="statPending">00</div>
                </div>
            </div>

            <!-- TABLE -->
            <div class="table-container reveal" style="animation-delay: 0.5s">
                <div class="table-header">
                    <div class="table-title">PARTICIPANT LIST</div>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search by name, email or college...">
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table id="participantsTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>College</th>
                                <th>Email</th>
                                <th>Member</th>
                                <th>Payment Details</th>
                                <th>Status</th>
                                <th>Check-in</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="9" style="text-align: center; padding: 2rem; color: var(--text-dim);">
                                    Fetching data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="login-overlay hidden" style="background: rgba(0,0,0,0.9); z-index: 20000; cursor: pointer;">
        <div style="max-width: 90%; max-height: 90%;">
            <img id="modalImg" src="" style="max-width: 100%; max-height: 100%; border-radius: 10px; box-shadow: 0 0 50px rgba(0,0,0,0.5);">
            <div style="text-align: center; color: white; margin-top: 15px; font-family: Inter, sans-serif; font-size: 0.9rem;">
                Click anywhere to close
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Modal Logic
        const imageModal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        imageModal.addEventListener('click', () => imageModal.classList.add('hidden'));

        function openModal(url) {
            modalImg.src = url;
            imageModal.classList.remove('hidden');
        }

        // 1. INITIALIZE SUPABASE
        const SUPABASE_URL = 'https://rgftzhzvzrcooajosqdd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnZnR6aHp2enJjb29ham9zcWRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDQyMzIsImV4cCI6MjA4ODc4MDIzMn0.FA8DdUmtOTjtbShtEiLytITCgWy_5t9dtqlcEZbyPJA';

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let participants = [];

        // ---- LOGIN LOGIC ----
        const loginOverlay = document.getElementById('loginOverlay');
        const dashboardContent = document.getElementById('dashboardContent');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        // Check if already logged in via Supabase Auth
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                loginOverlay.classList.add('hidden');
                dashboardContent.style.display = '';
                fetchParticipants();
            }
        }
        checkSession();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            const submitBtn = document.getElementById('loginBtn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Signing in...';
            submitBtn.disabled = true;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            submitBtn.innerText = originalText;
            submitBtn.disabled = false;

            if (error) {
                loginError.textContent = error.message || 'Invalid email or password.';
            } else if (data.session) {
                loginOverlay.classList.add('hidden');
                dashboardContent.style.display = '';
                loginError.textContent = '';
                fetchParticipants();
            }
        });

        // ---- LOGOUT ----
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            location.reload();
        });

        // ---- DATA FUNCTIONS ----
        async function fetchParticipants() {
            try {
                const { data, error } = await supabaseClient
                    .from('participants')
                    .select('*')
                    .order('createdat', { ascending: false });

                if (error) throw error;
                participants = data;
                updateDashboard();
            } catch (err) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" style="text-align: center; color: #ef4444;">Connection failed. Check Supabase configuration.</td></tr>';
            }
        }

        // ---- XSS SANITIZATION ----
        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function updateDashboard() {
            const total = participants.length;
            const paid = participants.filter(p => p.paymentstatus).length;
            const checkedInCount = participants.filter(p => p.checkedin).length;
            const pending = participants.filter(p => !p.paymentstatus).length;

            document.getElementById('statTotal').innerText = total;
            document.getElementById('statPaid').innerText = paid;
            document.getElementById('statIn').innerText = checkedInCount;
            document.getElementById('statPending').innerText = pending;

            renderTable(participants);
        }

        function renderTable(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="9" style="text-align: center;">No participants found</td></tr>';
                return;
            }

            data.forEach(p => {
                const safeName = escapeHTML(p.name);
                const safeCollege = escapeHTML(p.college);
                const safeEmail = escapeHTML(p.email);
                const safeIeeeId = escapeHTML(p.ieeeid);
                const safeTxnId = escapeHTML(p.transactionid);
                const safePromo = escapeHTML(p.promocode);
                const safeAmount = escapeHTML(String(p.paymentamount || '--'));
                const safeScreenshot = p.screenshoturl ? escapeHTML(p.screenshoturl) : null;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="Name">${safeName}</td>
                    <td data-label="College">${safeCollege}</td>
                    <td data-label="Email">${safeEmail}</td>
                    <td data-label="Member">
                        ${p.isieeemember ? `<span class="badge badge-paid" style="background:#a855f7">IEEE (${safeIeeeId || 'N/A'})</span>` : '<span style="opacity:0.5">NON-IEEE</span>'}
                        ${p.iscismember ? `<br><small style="color:var(--neon-blue)">+ CIS Member</small>` : ''}
                    </td>
                    <td data-label="Payment Details">
                        <div style="font-size: 0.8rem; line-height: 1.4;">
                            <div style="color: var(--text-dim);">TXN: <span style="color: #fff;">${safeTxnId || 'N/A'}</span></div>
                            <div style="color: var(--text-dim); margin-top: 4px;">Amt: <span style="color: var(--neon-blue); font-weight: bold;">₹${safeAmount}</span></div>
                            ${safeScreenshot ? `<button onclick="openModal('${safeScreenshot}')" style="margin-top: 5px; padding: 4px 8px; font-size: 0.7rem; background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.4); color: white; border-radius: 4px; cursor: pointer;">🖼 View Proof</button>` : '<div style="font-size: 0.7rem; color: #ef4444; margin-top: 5px;">No screenshot</div>'}
                        </div>
                    </td>
                    <td data-label="Status">
                        <span class="badge ${p.paymentstatus ? 'badge-paid' : 'badge-pending'}">
                            ${p.paymentstatus ? 'PAID' : 'PENDING'}
                        </span>
                    </td>
                    <td data-label="Check-in">
                        <span class="badge ${p.checkedin ? 'badge-in' : ''}" style="${!p.checkedin ? 'opacity: 0.3' : ''}">
                            ${p.checkedin ? 'CHECKED IN' : 'NO'}
                        </span>
                    </td>
                    <td data-label="Actions" class="action-btns">
                        ${!p.paymentstatus ? `<button class="btn-action btn-checkin" style="background:#10b981; color:white;" onclick="markPaid('${p.id}')">Verify & Paid</button>` : ''}
                        ${!p.checkedin ? `<button class="btn-action btn-checkin" onclick="checkIn('${p.id}')">Check-in</button>` : ''}
                        <button class="btn-action btn-delete" onclick="deleteParticipant('${p.id}')">Delete</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        async function checkIn(id) {
            if (!confirm('Mark as checked-in?')) return;
            try {
                const { error } = await supabaseClient
                    .from('participants')
                    .update({ checkedin: true })
                    .eq('id', id);

                if (error) throw error;
                fetchParticipants();
            } catch (err) { alert('Check-in failed'); }
        }

        async function markPaid(id) {
            if (!confirm('Mark this participant as PAID? This cannot be undone.')) return;
            try {
                const { error } = await supabaseClient
                    .from('participants')
                    .update({ paymentstatus: true })
                    .eq('id', id);

                if (error) throw error;
                fetchParticipants();
            } catch (err) { alert('Update failed'); }
        }

        async function deleteParticipant(id) {
            if (!confirm('Are you sure you want to delete this record?')) return;
            try {
                const { error } = await supabaseClient
                    .from('participants')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                fetchParticipants();
            } catch (err) { alert('Deletion failed'); }
        }

        // ---- EXPORT CSV ----
        document.getElementById('exportBtn').addEventListener('click', () => {
            if (participants.length === 0) return alert('No data to export');
            const headers = ['Name', 'Email', 'Phone', 'College', 'Department', 'Year', 'IEEE Member', 'IEEE ID', 'Payment Amount', 'Payment Status', 'Checked In'];
            const rows = participants.map(p => [
                p.name || '', p.email || '', p.phone || '', p.college || '', p.department || '', p.year || '',
                p.isieeemember ? 'Yes' : 'No', p.ieeeid || '', p.paymentamount || '',
                p.paymentstatus ? 'Paid' : 'Pending', p.checkedin ? 'Yes' : 'No'
            ]);

            const escapeCsv = (val) => '"' + String(val).replace(/"/g, '""') + '"';
            const csvContent = [headers, ...rows].map(row => row.map(escapeCsv).join(',')).join('\r\n');
            const fileName = 'participants_' + new Date().toISOString().slice(0, 10) + '.csv';

            // Use data URI approach for reliable filename
            const encodedUri = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csvContent);
            const a = document.createElement('a');
            a.setAttribute('href', encodedUri);
            a.setAttribute('download', fileName);
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // ---- SEARCH ----
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = participants.filter(p =>
                p.name.toLowerCase().includes(val) ||
                p.email.toLowerCase().includes(val) ||
                p.college.toLowerCase().includes(val)
            );
            renderTable(filtered);
        });

        // Auto Refresh every 30s
        setInterval(async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                fetchParticipants();
            }
        }, 30000);
    </script>
</body>

</html>
